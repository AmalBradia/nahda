<!doctype html>
<html lang="fr">
  <head>
    <title>مراحل المشروع</title>
    <meta charset="utf-8" />
    <link rel="icon" href="../images/icone.png" sizes="20x20" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/jquery-min.js"></script>
    <script src="../js/script.js"></script>
  </head>
  <body>
    <header class="hed" id="header">
      <script>
        inclureHeader(header);
      </script>
    </header>
    <div id="conteneur">
      <nav id="nav">
        <script>
          inclureMenu(web);
        </script>
      </nav>
      <hr width="0" />
      <h3 class="titre">مراحل المشروع</h3>
      <p class="mmB">
        <b>1 تقوية سواري المسجد من الأسفل إلى الأعلى:</b>
        أنظر الصور أسفله
      </p>
      <p style="text-align: center"></p>
      <p id="af" style="text-align: center">
        <b>سواري الأسفل</b>
      </p>
      <p style="display: flex; justify-content: center">
        <button
          onclick="precedent()"
          style="
            cursor: pointer;
            color: #b10a8f;
            width: 40px;
            background-color: aquamarine;
          "
        >
          &#9664;
        </button>
        <img
          id="slider"
          src="../images/sowarElmachroa/img1.jpeg"
          alt="image"
          width="80%"
        />
        <button
          onclick="suivant()"
          style="
            cursor: pointer;
            color: #b10a8f;
            width: 40px;
            background-color: aquamarine;
          "
        >
          &#9654;
        </button>
      </p>

      <hr width="0" />
      <h3 style="border-radius: 0px">بقية الصفحة في طور الإنجاز</h3>
      <p class="mmB"></p>
    </div>
    <footer class="pied" id="footer">
      <script>
        inclureFooter(footer);
      </script>
      <br />
      <a class="lien" href="../index.html">الرئيسية</a>
    </footer>
    <article id="myModal" class="modal">
      <article class="modal-content">
        <header class="modal-header">
          <br />
          &#9956; &#9957; &#9958; &#9956; &#9957; &#9958; &#9956; &#9957;
          &#9956; &#9957; &#9958; &#9956;
          <br />
        </header>
        <div class="modal-body" id="mybody"></div>
        <footer class="modal-footer">
          <span class="close" onclick="cache()">x</span>
        </footer>
      </article>
    </article>
    <script src="../js/modal.js"></script>
    <script>
      const images = [
        "../images/sowarElmachroa/img1.jpeg",
        "../images/sowarElmachroa/img2.jpeg",
        "../images/sowarElmachroa/img3.jpeg",
        "../images/sowarElmachroa/img4.jpeg",
        "../images/sowarElmachroa/img5.jpeg",
        "../images/sowarElmachroa/img6.jpeg",
        "../images/sowarElmachroa/img7.jpeg",
        "../images/sowarElmachroa/img8.jpeg",
        "../images/sowarElmachroa/img9.jpeg",
        "../images/sowarElmachroa/img10.jpeg",
        "../images/sowarElmachroa/img11.jpeg",
        "../images/sowarElmachroa/img12.jpeg",
        "../images/sowarElmachroa/img13.jpeg",
        "../images/sowarElmachroa/img14.jpeg",
      ];
      let index = 0;
      function suivant() {
        index++;
        if (index >= images.length) {
          index = 0;
        }
        if (0 <= index && index < 12) {
          document.getElementById("af").innerHTML = "<b>سواري الأسفل</b>";
        }
        if (12 <= index && index < 15) {
          document.getElementById("af").innerHTML = "<b>سواري الأعلى</b>";
        }
        document.getElementById("slider").src = images[index];
      }

      function precedent() {
        index = (index - 1 + images.length) % images.length;
        if (index >= images.length) {
          index = 0;
        }
        if (0 <= index && index < 13) {
          document.getElementById("af").innerHTML = "<b>سواري الأسفل</b>";
        }
        if (12 <= index && index < 15) {
          document.getElementById("af").innerHTML = "<b>سواري الأعلى</b>";
        }
        document.getElementById("slider").src = images[index];
      }
    </script>
  </body>
</html>
