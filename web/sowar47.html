<!doctype html>
<html lang="fr">
  <head>
    <title>صور 1447</title>
    <meta charset="utf-8" />
    <link rel="icon" href="../images/icone.png" sizes="20x20" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/jquery-min.js"></script>
    <script src="../js/script.js"></script>
  </head>
  <body>
    <header class="hed" id="header">
      <script>
        inclureHeader(header);
      </script>
    </header>
    <div id="conteneur">
      <nav id="nav">
        <script>
          inclureMenu(web);
        </script>
      </nav>
      <h3>أنشطة الجمعية في صور</h3>
      <hr width="0" />
      <p style="text-align: center">
        <button
          onclick="precedent()"
          style="
            cursor: pointer;
            color: #b10a8f;
            width: 40px;
            background-color: aquamarine;
          "
        >
          &#9664;
        </button>
        <button
          onclick="suivant()"
          style="
            cursor: pointer;
            color: #b10a8f;
            width: 40px;
            background-color: aquamarine;
          "
        >
          &#9654;
        </button>
      </p>
      <p id="af" style="text-align: center">
        <b>المواد التي كانت توزع طيلة شهر رمضان</b>
      </p>
      <p style="text-align: center">
        <img
          id="slider"
          src="../images/ramadan47/img1.jpeg"
          alt="image"
          width="80%"
        />
      </p>

      <hr width="0" />
    </div>
    <footer class="pied" id="footer">
      <script>
        inclureFooter(footer);
      </script>
      <br />
      <a class="lien" href="../index.html">الرئيسية</a>
    </footer>
    <article id="myModal" class="modal">
      <article class="modal-content">
        <header class="modal-header">
          <br />
          &#9956; &#9957; &#9958; &#9956; &#9957; &#9958; &#9956; &#9957;
          &#9956; &#9957; &#9958; &#9956;
          <br />
        </header>
        <div class="modal-body" id="mybody"></div>
        <footer class="modal-footer">
          <span class="close" onclick="cache()">x</span>
        </footer>
      </article>
    </article>
    <script src="../js/modal.js"></script>
    <script>
      const images = [
        "../images/ramadan47/img1.jpeg",
        "../images/ramadan47/img2.jpeg",
        "../images/ramadan47/img3.jpeg",
        "../images/ramadan47/img4.jpeg",
        "../images/ramadan47/img5.jpeg",
        "../images/ramadan47/img6.jpeg",
        "../images/ramadan47/img7.jpeg",
        "../images/ramadan47/img8.jpeg",
        "../images/ramadan47/img9.jpeg",
        "../images/ramadan47/img10.jpeg",
        "../images/ramadan47/img11.jpeg",
        "../images/ramadan47/img12.jpeg",
        "../images/ramadan47/img13.jpeg",
        "../images/ramadan47/img14.jpeg",
        "../images/ramadan47/img15.jpeg",
      ];
      let index = 0;
      function suivant() {
        index++;
        if (index >= images.length) {
          index = 0;
        }
        if (0 <= index && index < 6) {
          document.getElementById("af").innerHTML =
            "<b>المواد التي كانت توزع طيلة شهر رمضان</b>";
        }
        if (6 <= index && index < 9) {
          document.getElementById("af").innerHTML =
            "<b>المواد التي وزعت بمناسبة عيد الفطر</b>";
        }
        if (9 <= index && index < 12) {
          document.getElementById("af").innerHTML = "<b>جانب من المستفدين</b>";
        }
        if (12 <= index && index <= 14) {
          document.getElementById("af").innerHTML =
            "<b>الفريق الذي كان يسهر على توزيع وجبة الإفطار</b>";
        }
        document.getElementById("slider").src = images[index];
      }

      function precedent() {
        index = (index - 1 + images.length) % images.length;
        if (index >= images.length) {
          index = 0;
        }
        if (0 <= index && index < 6) {
          document.getElementById("af").innerHTML =
            "<b>المواد التي كانت توزع طيلة شهر رمضان</b>";
        }
        if (6 <= index && index < 9) {
          document.getElementById("af").innerHTML =
            "<b>المواد التي وزعت بمناسبة عيد الفطر</b>";
        }
        if (9 <= index && index < 12) {
          document.getElementById("af").innerHTML = "<b>جانب من المستفدين</b>";
        }
        if (12 <= index && index <= 14) {
          document.getElementById("af").innerHTML =
            "<b>الفريق الذي كان يسهر على توزيع وجبة الإفطار</b>";
        }
        document.getElementById("slider").src = images[index];
      }
    </script>
  </body>
</html>
